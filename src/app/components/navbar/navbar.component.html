<header class="navbar" [class.scrolled]="isScrolled()">
  <div class="nav-container">
    <!-- Brand Logo -->
    <a href="#" class="brand" (click)="scrollToSection('hero', $event)">
      <span class="brand-text">santiago</span>
      <span class="brand-dot">.dev</span>
    </a>

    <!-- Desktop Navigation -->
    <nav class="desktop-nav">
      <ul class="nav-list">
        @for (item of navItems; track item.id) {
          <li class="nav-item">
            <a 
              href="#" 
              class="nav-link" 
              [class.active]="activeSection() === item.id"
              (click)="scrollToSection(item.id, $event)"
            >
              {{ item.labelKey | translate }}
            </a>
          </li>
        }
      </ul>
    </nav>

    <!-- Controls (Theme + Lang) -->
    <div class="nav-controls">
      <!-- Language Toggle -->
      <button 
        class="control-btn lang-btn" 
        (click)="i18nService.toggleLanguage()"
        aria-label="Toggle language"
        title="Change Language"
      >
        <span class="lang-text">{{ i18nService.currentLang() | uppercase }}</span>
      </button>

      <!-- Theme Toggle -->
      <button 
        class="control-btn theme-btn" 
        (click)="themeService.toggleTheme()" 
        aria-label="Toggle dark/light theme"
        [title]="themeService.currentTheme() === 'dark' ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
      >
        @if (themeService.currentTheme() === 'dark') {
          <!-- Moon Icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-icon">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        } @else {
          <!-- Sun Icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-icon">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        }
      </button>

      <!-- Hamburger Button (Mobile Only) -->
      <button 
        class="hamburger-btn" 
        [class.open]="isMobileMenuOpen()" 
        (click)="toggleMobileMenu()" 
        aria-label="Toggle mobile menu"
      >
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>
  </div>

  <!-- Mobile Dropdown Menu -->
  <div class="mobile-menu" [class.open]="isMobileMenuOpen()">
    <nav class="mobile-nav">
      <ul class="mobile-list">
        @for (item of navItems; track item.id) {
          <li class="mobile-item">
            <a 
              href="#" 
              class="mobile-link" 
              [class.active]="activeSection() === item.id"
              (click)="scrollToSection(item.id, $event)"
            >
              {{ item.labelKey | translate }}
            </a>
          </li>
        }
      </ul>
    </nav>
  </div>
</header>
