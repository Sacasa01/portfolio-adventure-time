<section id="about" class="section-full about-section">
  <div class="container">
    <!-- Section Title -->
    <div class="section-title-group" appScrollReveal animationClass="reveal-fade-up">
      <span class="section-subtitle">{{ 'ABOUT.SUBTITLE' | translate }}</span>
      <h2 class="section-title line-draw">{{ 'ABOUT.TITLE' | translate }}</h2>
    </div>

    <!-- Main Grid -->
    <div class="grid-2 about-grid">
      <!-- Left Column: Visual Frame -->
      <div class="about-visual" appScrollReveal animationClass="reveal-fade-in" staggerClass="stagger-1">
        <div class="about-frame-container">
          <!-- Japanese red sun/accent circle behind frame -->
          <div class="about-accent-circle"></div>
          
          <div class="about-photo-frame">
            <!-- Image placeholder -->
            <picture>
              <source srcset="photos/about/about.webp" type="image/webp">
              <img src="photos/about/about.jpg" alt="Santiago Castro Salt" class="about-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
              <!-- Visual placeholder when photo is missing -->
              <div class="about-photo-placeholder">
                <div class="about-placeholder-art">
                  <!-- Abstract minimalist BMO outline SVG (suttle AT reference) -->
                  <svg viewBox="0 0 100 100" fill="none" class="bmo-svg">
                    <!-- BMO Body Frame -->
                    <rect x="25" y="15" width="50" height="70" rx="6" ry="6" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></rect>
                    <!-- BMO Screen -->
                    <rect x="31" y="21" width="38" height="26" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"></rect>
                    <!-- BMO Face Lines (cute smile) -->
                    <circle cx="42" cy="30" r="1.5" fill="currentColor"></circle>
                    <circle cx="58" cy="30" r="1.5" fill="currentColor"></circle>
                    <path d="M47 36 Q50 39 53 36" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"></path>
                    
                    <!-- BMO Controls (D-pad) -->
                    <path d="M43 62 L47 62 M45 60 L45 64" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                    <!-- BMO Buttons -->
                    <circle cx="58" cy="62" r="2.5" fill="var(--accent-primary)"></circle>
                    <circle cx="64" cy="56" r="2" fill="var(--accent-secondary)"></circle>
                    <!-- BMO Disk Slot -->
                    <line x1="33" y1="52" x2="67" y2="52" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></line>
                  </svg>
                </div>
                <span class="about-placeholder-text">public/photos/about/about.jpg</span>
              </div>
            </picture>
          </div>
        </div>
      </div>

      <!-- Right Column: Content -->
      <div class="about-content">
        <div appScrollReveal animationClass="reveal-fade-up" staggerClass="stagger-2">
          <p class="bio-para">{{ 'ABOUT.BIO_1' | translate }}</p>
        </div>
        
        <div appScrollReveal animationClass="reveal-fade-up" staggerClass="stagger-3">
          <p class="bio-para">{{ 'ABOUT.BIO_2' | translate }}</p>
        </div>

        <!-- Skills Tags -->
        <div class="tags-container" appScrollReveal animationClass="reveal-fade-up" staggerClass="stagger-4">
          <h3 class="tags-title">{{ 'ABOUT.VALUES_TITLE' | translate }}</h3>
          <div class="tags-list">
            @for (tag of getTags(); track tag) {
              <span class="tag skill-tag">{{ tag }}</span>
            }
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
