<div class="home-scene">
  <!-- Sky background clouds -->
  <div class="clouds-container">
    <div class="cloud cloud-1 pulse-anim"></div>
    <div class="cloud cloud-2 float-anim"></div>
    <div class="cloud cloud-3 pulse-anim"></div>
  </div>

  <!-- Main introduction text board -->
  <div class="intro-board glass-panel float-anim">
    <h1 class="welcome-title">LA CASA DEL ÁRBOL</h1>
    <h2 class="dev-name">Hola, soy un Desarrollador Web</h2>
    <p class="dev-desc">Construyendo interfaces mágicas y limpias en el Reino de Ooo.</p>
    
    <!-- Character Dialogue Bubble -->
    <div class="dialogue-box">
      <div class="dialogue-bubble">
        <span class="speaker-tag" [class.speaker-jake]="activeCharacter() === 'jake'">
          {{ activeCharacter() === 'finn' ? 'Finn' : 'Jake' }}:
        </span>
        <p class="dialogue-content">{{ dialogText() }}</p>
      </div>
    </div>

    <div class="action-row">
      <button class="adventure-btn" routerLink="/about">
        <span>¡Ver mi perfil! 🌟</span>
      </button>
    </div>
  </div>

  <!-- Interactive Characters -->
  <div class="characters-container">
    <!-- Finn -->
    <div class="character-wrapper finn-wrapper" [class.active]="activeCharacter() === 'finn'" (click)="switchCharacter('finn')">
      <div class="character-graphics finn-graphic shake-hover">
        <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
          <!-- Hat/Head -->
          <path d="M20 50 C20 20, 80 20, 80 50 C80 65, 75 75, 50 75 C25 75, 20 65, 20 50 Z" fill="#FFFFFF" stroke="#000" stroke-width="4"/>
          <!-- Bear Ears -->
          <circle cx="28" cy="20" r="10" fill="#FFFFFF" stroke="#000" stroke-width="4"/>
          <circle cx="72" cy="20" r="10" fill="#FFFFFF" stroke="#000" stroke-width="4"/>
          <circle cx="28" cy="20" r="5" fill="#FFF"/>
          <circle cx="72" cy="20" r="5" fill="#FFF"/>
          <!-- Face skin area -->
          <circle cx="50" cy="48" r="20" fill="#FFE0B2" stroke="#000" stroke-width="3"/>
          <!-- Eyes -->
          <circle cx="43" cy="45" r="2.5" fill="#000"/>
          <circle cx="57" cy="45" r="2.5" fill="#000"/>
          <!-- Smile -->
          <path d="M46 52 Q50 56 54 52" stroke="#000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <!-- Backpack strap -->
          <rect x="25" y="73" width="10" height="35" rx="5" fill="#4CAF50" stroke="#000" stroke-width="3"/>
          <rect x="65" y="73" width="10" height="35" rx="5" fill="#4CAF50" stroke="#000" stroke-width="3"/>
          <!-- Blue Shirt -->
          <path d="M25 75 L75 75 L80 110 L20 110 Z" fill="#29B6F6" stroke="#000" stroke-width="4"/>
        </svg>
      </div>
      <span class="char-label">Finn</span>
    </div>

    <!-- Jake -->
    <div class="character-wrapper jake-wrapper" [class.active]="activeCharacter() === 'jake'" (click)="switchCharacter('jake')">
      <div class="character-graphics jake-graphic shake-hover">
        <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
          <!-- Jake Body -->
          <rect x="20" y="25" width="60" height="75" rx="30" fill="#FFB300" stroke="#000" stroke-width="4"/>
          <!-- Ears -->
          <path d="M15 45 C10 45, 10 65, 20 60 Z" fill="#FFB300" stroke="#000" stroke-width="3"/>
          <path d="M85 45 C90 45, 90 65, 80 60 Z" fill="#FFB300" stroke="#000" stroke-width="3"/>
          <!-- Jake Big Eyes -->
          <circle cx="36" cy="50" r="14" fill="#FFFFFF" stroke="#000" stroke-width="3.5"/>
          <circle cx="64" cy="50" r="14" fill="#FFFFFF" stroke="#000" stroke-width="3.5"/>
          <!-- Pupils -->
          <circle cx="38" cy="50" r="9" fill="#000"/>
          <circle cx="62" cy="50" r="9" fill="#000"/>
          <circle cx="36" cy="48" r="3" fill="#FFF"/>
          <circle cx="60" cy="48" r="3" fill="#FFF"/>
          <!-- Jowls/Snout -->
          <path d="M42 66 C42 60, 58 60, 58 66 C58 72, 42 72, 42 66 Z" fill="#FFB300" stroke="#000" stroke-width="3"/>
          <circle cx="50" cy="62" r="5" fill="#000"/> <!-- Nose -->
          <!-- Smile curve -->
          <path d="M46 68 Q50 72 54 68" stroke="#000" stroke-width="2.5" fill="none"/>
          <!-- Arms -->
          <path d="M22 65 Q10 70 20 80" stroke="#000" stroke-width="4" fill="none" stroke-linecap="round"/>
          <path d="M78 65 Q90 70 80 80" stroke="#000" stroke-width="4" fill="none" stroke-linecap="round"/>
          <!-- Legs -->
          <rect x="32" y="98" width="10" height="15" rx="3" fill="#FFB300" stroke="#000" stroke-width="3"/>
          <rect x="58" y="98" width="10" height="15" rx="3" fill="#FFB300" stroke="#000" stroke-width="3"/>
        </svg>
      </div>
      <span class="char-label">Jake</span>
    </div>
  </div>

  <!-- Grass Ground & Treehouse details -->
  <div class="ground-deco">
    <div class="grass-tuft tuft-1"></div>
    <div class="grass-tuft tuft-2"></div>
    <div class="grass-tuft tuft-3"></div>
  </div>
</div>
