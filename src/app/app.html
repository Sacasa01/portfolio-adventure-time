<div class="app-container">
  <!-- Top Navigation Header -->
  <header class="app-header">
    <nav class="nav-card">
      <div class="logo-container" routerLink="/home" (click)="playNavSound()">
        <span class="logo-text">ooo.dev</span>
        <span class="logo-subtext">| Portafolio</span>
      </div>

      <ul class="nav-links">
        <li>
          <a class="nav-link" routerLink="/home" routerLinkActive="active" (click)="playNavSound()">Casa Árbol</a>
        </li>
        <li>
          <a class="nav-link" routerLink="/about" routerLinkActive="active" (click)="playNavSound()">Prismo</a>
        </li>
        <li>
          <a class="nav-link" routerLink="/projects" routerLinkActive="active" (click)="playNavSound()">Dulce Reino</a>
        </li>
        <li>
          <a class="nav-link" routerLink="/skills" routerLinkActive="active" (click)="playNavSound()">Marceline</a>
        </li>
        <li>
          <a class="nav-link" routerLink="/contact" routerLinkActive="active" (click)="playNavSound()">Reino Hielo</a>
        </li>
      </ul>
    </nav>

    <!-- Side Control Buttons -->
    <div class="controls-container">
      <!-- Snail Counter -->
      @if (snailService.foundCount() > 0) {
        <div class="snail-counter" title="Caracoles encontrados">
          🐌 <span class="counter-text">{{ snailService.foundCount() }}</span>
        </div>
      }

      <!-- Mute Toggle -->
      <button class="control-btn" (click)="toggleMute()" [attr.title]="isMuted() ? 'Activar sonido' : 'Silenciar'">
        @if (isMuted()) {
          <svg class="control-icon" viewBox="0 0 24 24">
            <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
          </svg>
        } @else {
          <svg class="control-icon" viewBox="0 0 24 24">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
          </svg>
        }
      </button>

      <!-- Lich Mode Toggle (Dark/Apocalypse Theme) -->
      <button class="control-btn" [class.lich-active-btn]="soundService.isLichActive()" (click)="toggleLichMode()" [attr.title]="soundService.isLichActive() ? 'Despertar a Ooo' : 'Invocar al Lich'">
        @if (soundService.isLichActive()) {
          <!-- Skull / Lich symbol -->
          <svg class="control-icon" viewBox="0 0 24 24">
            <path d="M12 2C6.47 2 2 6.47 2 12c0 4.97 4.02 9 9 9h2c4.98 0 9-4.03 9-9 0-5.53-4.48-10-10-10zm0 16c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm-2.5-7.5c.83 0 1.5-.67 1.5-1.5S10.33 7.5 9.5 7.5 8 8.17 8 9s.67 1.5 1.5 1.5zm5 0c.83 0 1.5-.67 1.5-1.5S15.33 7.5 14.5 7.5s-1.5.67-1.5 1.5.67 1.5 1.5 1.5zm-5 4c1.1 0 2-.9 2-2H8c0 1.1.9 2 2 2zm5 0c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2z"/>
          </svg>
        } @else {
          <!-- The Enchiridion / Book outline symbol -->
          <svg class="control-icon" viewBox="0 0 24 24">
            <path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4zm12 16H6v-6h12v6zm0-8h-5V4h5v8z"/>
          </svg>
        }
      </button>
    </div>
  </header>

  <!-- Main view wrapper -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

  <!-- BMO Floating Widget -->
  <app-bmo-widget></app-bmo-widget>

  <!-- Hidden Snail (Caracol) Easter Egg -->
  @if (snailService.hidingSection() === currentRoute() && !snailService.isFoundInCurrentSection()) {
    <div class="snail-easter-egg float-anim" 
         [style.left.%]="snailService.snailPosition().x" 
         [style.top.%]="snailService.snailPosition().y"
         (click)="snailService.clickSnail()"
         title="¡Me has encontrado! Wenk!">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 44C12 36 24 36 28 38C32 40 40 40 44 38C48 36 50 32 50 28C50 22 44 18 36 18C28 18 20 24 20 32" stroke="#5C3D2E" stroke-width="4" stroke-linecap="round"/>
        <circle cx="36" cy="28" r="10" fill="#E8C497" stroke="#5C3D2E" stroke-width="4"/>
        <path d="M16 44H56C58 44 60 46 60 48C60 50 58 52 56 52H12C8 52 4 48 4 44C4 40 8 36 12 36C14 36 16 38 16 40V44Z" fill="#F4E0B9" stroke="#5C3D2E" stroke-width="4"/>
        <path d="M4 44C4 36 8 30 12 30C14 30 16 32 16 34C16 36 12 40 4 44Z" fill="#F4E0B9"/>
        <circle cx="14" cy="24" r="2" fill="#000"/>
        <line x1="12" y1="22" x2="10" y2="16" stroke="#5C3D2E" stroke-width="2"/>
        <circle cx="10" cy="15" r="1.5" fill="#5C3D2E"/>
        <path d="M14 27C15 27 16 28 16 29" stroke="#5C3D2E" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
  }

  <!-- Spooky Lich Overlay -->
  <div class="lich-vignette"></div>
</div>
